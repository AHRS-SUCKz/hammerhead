function hslToHex(h,s,l){l/=100;const a=s*Math.min(l,1-l)/100;const f=n=&gt;{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,&#39;0&#39;);};return&#39;#&#39;+f(0)+f(8)+f(4);}
function hexToRgb(hex){return parseInt(hex.slice(1,3),16)+&#39;,&#39;+parseInt(hex.slice(3,5),16)+&#39;,&#39;+parseInt(hex.slice(5,7),16);}
function getTrailColor(){return`hsl(${trailHue},${trailSat}%,${trailLit}%)`;}

/* GAME STATUS CHECKING */
let gamesOnline = true;
let checkInProgress = false;


async function checkGameStatus() {
    if (checkInProgress) return;
    checkInProgress = true;
    
    const statusEl = document.getElementById(&#39;maint-status&#39;);
    const maintPage = document.getElementById(&#39;maintenance-page&#39;);
    
    if (statusEl) {
        statusEl.textContent = &#39;Checking game servers...&#39;;
        statusEl.className = &#39;maint-status checking&#39;;
    }
    
    // Show checking state if maintenance page is visible
    if (maintPage &amp;&amp; maintPage.classList.contains(&#39;active&#39;)) {
        // Already showing maintenance, just update status
    }
    
    try {
        // Try to fetch a small test resource from one of the game CDNs
        // Using a HEAD request with no-cors to check connectivity
        const testUrls = [
            &#39;https://byod.geeked.wtf/favicon.ico&#39;,
            &#39;https://cdn.jsdelivr.net/gh/gn-math/covers@main/1.png&#39;,
            &#39;https://www.crazygames.com/favicon.ico&#39;
        ];
        
        let online = false;
        
        for (const url of testUrls) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() =&gt; controller.abort(), 5000);
                
                const response = await fetch(url, { 
                    method: &#39;HEAD&#39;, 
                    mode: &#39;no-cors&#39;,
                    signal: controller.signal,
                    cache: &#39;no-cache&#39;
                });
                
                clearTimeout(timeoutId);
                online = true;
                break;
            } catch (e) {
                continue;
            }
        }
        
        gamesOnline = online;
        
        if (!gamesOnline) {
            showMaintenance();
        } else {
            hideMaintenance();
            showErrorToast(&#39;Games are online! ✓&#39;);
        }
        
    } catch (e) {
        console.error(&#39;Status check failed:&#39;, e);
        gamesOnline = false;
        showMaintenance();
    } finally {
        checkInProgress = false;
    }
}


function showMaintenance() {
    const maintPage = document.getElementById(&#39;maintenance-page&#39;);
    const statusEl = document.getElementById(&#39;maint-status&#39;);
    
    if (maintPage) maintPage.classList.add(&#39;active&#39;);
    if (statusEl) {
        statusEl.textContent = &#39;Status: Offline&#39;;
        statusEl.className = &#39;maint-status offline&#39;;
    }
    
    // Close any open game
    closeGame();
}


function hideMaintenance() {
    const maintPage = document.getElementById(&#39;maintenance-page&#39;);
    if (maintPage) maintPage.classList.remove(&#39;active&#39;);
}


function showErrorToast(msg) {
    const toast = document.getElementById(&#39;error-toast&#39;);
    if (toast) {
        toast.textContent = msg;
        toast.classList.add(&#39;show&#39;);
        setTimeout(() =&gt; toast.classList.remove(&#39;show&#39;), 3000);
    }
}

/* FISH */
function drawFish(ctx,x,y,sz,ang,color,op,tailPhase){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  const tw=Math.sin(tailPhase)*0.45;
  const rgb=hexToRgb(color);
  const grd=ctx.createRadialGradient(-sz*.1,-sz*.25,sz*.1,0,0,sz*1.1);
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const lr=Math.min(255,r+80),lg=Math.min(255,g+80),lb=Math.min(255,b+80);
  grd.addColorStop(0,`rgba(${lr},${lg},${lb},${op})`);
  grd.addColorStop(1,`rgba(${rgb},${op*.6})`);
  ctx.save();ctx.translate(-sz*.95,0);ctx.rotate(tw);
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.bezierCurveTo(-sz*.3,-sz*.7,-sz*.8,-sz*.6,-sz*.7,0);
  ctx.bezierCurveTo(-sz*.8,sz*.6,-sz*.3,sz*.7,0,0);
  ctx.fillStyle=`rgba(${rgb},${op*.75})`;ctx.fill();ctx.restore();
  ctx.beginPath();ctx.moveTo(sz*.85,0);
  ctx.bezierCurveTo(sz*.7,-sz*.5,-sz*.2,-sz*.55,-sz*.95,-sz*.15);
  ctx.lineTo(-sz*.95,sz*.15);
  ctx.bezierCurveTo(-sz*.2,sz*.55,sz*.7,sz*.5,sz*.85,0);
  ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();ctx.moveTo(sz*.1,-sz*.4);
  ctx.bezierCurveTo(sz*.25,-sz*1.0,sz*.55,-sz*.9,sz*.45,-sz*.4);
  ctx.closePath();ctx.fillStyle=`rgba(${rgb},${op*.65})`;ctx.fill();
  ctx.beginPath();ctx.moveTo(sz*.15,sz*.15);
  ctx.bezierCurveTo(sz*.4,sz*.6,-sz*.05,sz*.65,-sz*.25,sz*.35);
  ctx.closePath();ctx.fillStyle=`rgba(${rgb},${op*.55})`;ctx.fill();
  ctx.strokeStyle=`rgba(${lr},${lg},${lb},${op*.25})`;ctx.lineWidth=.7;
  for(let i=0;i&lt;3;i++){ctx.beginPath();ctx.arc(sz*(.5-i*.3),-sz*.05,sz*(.28+i*.05),Math.PI*.6,Math.PI*1.4);ctx.stroke();}
  ctx.beginPath();ctx.arc(sz*.5,-sz*.1,sz*.15,0,Math.PI*2);ctx.fillStyle=&#39;rgba(0,0,0,.9)&#39;;ctx.fill();
  ctx.beginPath();ctx.arc(sz*.5,-sz*.1,sz*.1,0,Math.PI*2);ctx.fillStyle=`rgba(${Math.min(255,r+120)},${Math.min(255,g+120)},${Math.min(255,b+120)},.8)`;ctx.fill();
  ctx.beginPath();ctx.arc(sz*.52,-sz*.12,sz*.05,0,Math.PI*2);ctx.fillStyle=&#39;rgba(0,0,0,.95)&#39;;ctx.fill();
  ctx.beginPath();ctx.arc(sz*.55,-sz*.15,sz*.03,0,Math.PI*2);ctx.fillStyle=&#39;rgba(255,255,255,.95)&#39;;ctx.fill();
  ctx.restore();
}
function initFish(){
  if(fishCanvas)destroyFish();
  fishCanvas=document.createElement(&#39;canvas&#39;);
  fishCanvas.style.cssText=&#39;position:fixed;inset:0;pointer-events:none;z-index:9997;&#39;;
  fishCanvas.width=window.innerWidth;fishCanvas.height=window.innerHeight;
  document.body.appendChild(fishCanvas);fishCtx=fishCanvas.getContext(&#39;2d&#39;);
  fishList=[];fishTrails=[];fishTime=0;
  for(let i=0;i&lt;fishCount;i++){
    fishList.push({angle:(i/fishCount)*Math.PI*2,radius:40+Math.floor(i/3)*14,speed:.016+Math.random()*.014,x:fishCX,y:fishCY,vx:0,vy:0,scattered:false,opacity:1,size:7+Math.floor(Math.random()*4),tailOffset:Math.random()*Math.PI*2,tailSpeed:3+Math.random()*2});
    fishTrails.push([]);
  }
  animateFish();
}
function destroyFish(){if(fishRAF){cancelAnimationFrame(fishRAF);fishRAF=null;}if(fishCanvas){fishCanvas.remove();fishCanvas=null;}fishCtx=null;fishList=[];fishTrails=[];}
function animateFish(){
  if(!fishCanvas||!fishCtx)return;
  if(fishCanvas.width!==window.innerWidth)fishCanvas.width=window.innerWidth;
  if(fishCanvas.height!==window.innerHeight)fishCanvas.height=window.innerHeight;
  fishCtx.clearRect(0,0,fishCanvas.width,fishCanvas.height);
  fishTime+=0.05;
  const color=hslToHex(fishHue,90,65);
  for(let i=0;i&lt;fishList.length;i++){
    const f=fishList[i],px=f.x,py=f.y;
    if(f.scattered){f.x+=f.vx;f.y+=f.vy;f.vx*=.92;f.vy*=.92;if(Math.abs(f.vx)&lt;.15&amp;&amp;Math.abs(f.vy)&lt;.15)f.scattered=false;}
    else{f.angle+=f.speed;f.x=fishCX+Math.cos(f.angle)*f.radius;f.y=fishCY+Math.sin(f.angle)*f.radius;}
    const fa=Math.atan2(f.y-py,f.x-px);
    const tailPhase=fishTime*f.tailSpeed+f.tailOffset;
    fishTrails[i].push({x:px,y:py});
    if(fishTrails[i].length&gt;18)fishTrails[i].shift();
    const rgb=hexToRgb(color);
    for(let j=0;j&lt;fishTrails[i].length;j++){const tp=fishTrails[i][j],to=(j/fishTrails[i].length)*.5,ts=f.size*(j/fishTrails[i].length)*.6;fishCtx.beginPath();fishCtx.arc(tp.x,tp.y,Math.max(.5,ts),0,Math.PI*2);fishCtx.fillStyle=`rgba(${rgb},${to})`;fishCtx.fill();}
    drawFish(fishCtx,f.x,f.y,f.size,fa,color,f.opacity,tailPhase);
  }
  fishRAF=requestAnimationFrame(animateFish);
}

function playSound(type){

  const ac=audioContext;
  function tone(freq,type,vol,start,dur,freqEnd){
    const o=ac.createOscillator(),g=ac.createGain(),now=ac.currentTime;

  }
